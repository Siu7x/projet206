  <!-- ── WebGL SHADER ── -->
  <script>
  (function () {
    const canvas = document.getElementById('bg-canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

    // Fallback CSS si WebGL absent
    if (!gl) {
      document.body.classList.add('no-webgl');
      return;
    }

    /* ─── Vertex shader ─────────────────────────────────────────── */
    const VS = `
      attribute vec2 a_pos;
      void main(){ gl_Position = vec4(a_pos,0.,1.); }
    `;

    /* ─── Fragment shader — plasma tourbillonnant orange/noir ────── */
    const FS = `
      precision mediump float;
      uniform float u_time;
      uniform vec2  u_res;

      /* Simplex-like noise 2D */
      vec2 hash2(vec2 p){
        p = vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));
        return fract(sin(p)*43758.5453) * 2.0 - 1.0;
      }
      float snoise(vec2 p){
        const float K1=0.366025404, K2=0.211324865;
        vec2 i = floor(p+(p.x+p.y)*K1);
        vec2 a = p - i + (i.x+i.y)*K2;
        vec2 o = step(a.yx,a.xy);
        vec2 b = a - o + K2;
        vec2 c = a - 1.0 + 2.0*K2;
        vec3 h = max(0.5-vec3(dot(a,a),dot(b,b),dot(c,c)),0.0);
        return dot(h*h*h*h, vec3(dot(a,hash2(i)),dot(b,hash2(i+o)),dot(c,hash2(i+1.0)))) * 70.0;
      }

      /* fBm fractal Brownian motion */
      float fbm(vec2 p){
        float v=0.0, a=0.5;
        mat2 rot = mat2(cos(0.5),sin(0.5),-sin(0.5),cos(0.5));
        for(int i=0;i<5;i++){
          v += a * snoise(p);
          p  = rot * p * 2.07;
          a *= 0.5;
        }
        return v * 0.5 + 0.5;
      }

      void main(){
        vec2 uv = gl_FragCoord.xy / u_res;
        float asp = u_res.x / u_res.y;
        vec2 p = (uv * 2.0 - 1.0) * vec2(asp, 1.0);

        float t = u_time * 0.18;

        /* Tourbillon : rotation par rayon */
        float r   = length(p);
        float ang = atan(p.y, p.x);
        vec2 sp   = vec2(
          r * cos(ang + t * 1.1 + r * 1.6),
          r * sin(ang + t * 1.1 + r * 1.6)
        );

        /* Double couche de bruit */
        float n1 = fbm(sp * 1.4 + vec2(t * 0.4, 0.0));
        float n2 = fbm(sp * 1.9 - vec2(0.0, t * 0.3));
        float n  = clamp(n1 * 0.6 + n2 * 0.5, 0.0, 1.0);

        /* Vignette douce sur les bords */
        float vig = 1.0 - smoothstep(0.35, 1.3, r * 0.9);

        /* Palette : noir → orange sombre → #F97316 → lueur ambrée */
        vec3 c0 = vec3(0.0,  0.0,   0.0);    /* noir pur       */
        vec3 c1 = vec3(0.22, 0.055, 0.0);    /* orange très foncé */
        vec3 c2 = vec3(0.976,0.451, 0.086);  /* #F97316        */
        vec3 c3 = vec3(1.0,  0.82,  0.42);   /* ambre lumineux */

        vec3 col;
        if(n < 0.28)      col = mix(c0, c1, n / 0.28);
        else if(n < 0.58) col = mix(c1, c2, (n-0.28)/0.30);
        else              col = mix(c2, c3, (n-0.58)/0.42);

        col *= vig;
        /* Assombrir : on veut que le fond reste sombre pour lire le formulaire */
        col *= 0.72;

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    /* ─── Compile shaders ──────────────────────────────────────── */
    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER,   VS));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    /* ─── Quad plein écran ─────────────────────────────────────── */
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes  = gl.getUniformLocation(prog, 'u_res');

    /* ─── Resize canvas ────────────────────────────────────────── */
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', resize);

    /* ─── Boucle de rendu (30 fps cap sur mobile) ──────────────── */
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    const TARGET_FPS = isMobile ? 24 : 50;
    const FRAME_MS   = 1000 / TARGET_FPS;
    let last = 0, start = performance.now();

    function loop(now) {
      requestAnimationFrame(loop);
      if (now - last < FRAME_MS) return;
      last = now;
      const t = (now - start) * 0.001;
      gl.uniform1f(uTime, t);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    requestAnimationFrame(loop);

    /* ─── Pause si onglet caché (économie CPU) ─────────────────── */
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) start = performance.now() - last;
    });
  })();
  </script>
